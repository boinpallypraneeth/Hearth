<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearth — local chat</title>
<!-- marked.js renders markdown; highlight.js colors code blocks. Both from CDN. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Newsreader:ital,opsz@0,6..72;1,6..72&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f4f0e8;
    --surface: #fbf9f4;
    --sidebar: #efe9dd;
    --ink: #2b2722;
    --ink-soft: #6b6358;
    --accent: #b8512e;
    --user-bubble: #2b2722;
    --user-ink: #f4f0e8;
    --line: #e3dccf;
    --code-bg: #282c34;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1916;
      --surface: #262119;
      --sidebar: #171411;
      --ink: #ece4d6;
      --ink-soft: #a89b87;
      --accent: #e0794f;
      --user-bubble: #e0794f;
      --user-ink: #1c1916;
      --line: #352e25;
      --code-bg: #1a1d23;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Newsreader', Georgia, serif;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ===== SIDEBAR ===== */
  #sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--sidebar);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    transition: margin-left .2s;
  }
  #sidebar.collapsed { margin-left: -260px; }
  .side-head {
    padding: 18px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .side-head h1 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 22px;
    letter-spacing: -0.02em;
  }
  .new-chat {
    margin: 0 16px 12px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 12px; padding: 11px; cursor: pointer;
    font-family: 'Fraunces', serif; font-size: 14px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .new-chat:hover { opacity: .92; }
  #chatList { flex: 1; overflow-y: auto; padding: 0 8px; }
  .chat-item {
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    font-size: 15px; color: var(--ink-soft);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px; display: flex; align-items: center; justify-content: space-between;
  }
  .chat-item:hover { background: var(--bg); color: var(--ink); }
  .chat-item.active { background: var(--bg); color: var(--ink); }
  .chat-item .del {
    opacity: 0; font-size: 16px; padding: 0 4px; color: var(--ink-soft);
    border: none; background: none; cursor: pointer; flex-shrink: 0;
  }
  .chat-item:hover .del { opacity: .6; }
  .chat-item .del:hover { opacity: 1; color: #c2453a; }
  .side-foot { padding: 12px 16px; border-top: 1px solid var(--line); }

  /* ===== MAIN ===== */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 14px;
  }
  .icon-btn {
    background: transparent; border: 1px solid var(--line); color: var(--ink-soft);
    border-radius: 9px; width: 36px; height: 36px; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  header .title { font-family: 'Fraunces', serif; font-size: 17px; flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #c2453a;
    flex-shrink: 0; transition: background .3s; }
  header .dot.online { background: #5a9367; }
  .ghost {
    background: transparent; border: 1px solid var(--line); color: var(--ink-soft);
    border-radius: 9px; padding: 8px 13px; font-family: 'Fraunces', serif;
    font-size: 13px; cursor: pointer; flex-shrink: 0;
  }
  .ghost:hover { border-color: var(--accent); color: var(--accent); }
  .ghost.danger:hover { border-color: #c2453a; color: #c2453a; }

  /* memory panel */
  #memoryPanel { border-bottom: 1px solid var(--line); background: var(--surface);
    padding: 18px 0; max-height: 38vh; overflow-y: auto; }
  #memoryPanel.hidden { display: none; }
  .mem-head { display: flex; align-items: center; justify-content: space-between;
    font-family: 'Fraunces', serif; font-size: 15px; margin-bottom: 12px; }
  #memList { list-style: none; }
  #memList li { padding: 9px 14px; margin-bottom: 7px; background: var(--bg);
    border-radius: 10px; font-size: 15px; line-height: 1.5; }
  .mem-empty { color: var(--ink-soft); font-style: italic; font-size: 15px; }
  .mem-empty.hidden { display: none; }

  #thread { flex: 1; overflow-y: auto; padding: 30px 0; position: relative; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 28px; }

  .msg { margin-bottom: 26px; display: flex; flex-direction: column; }
  .msg .who { font-family: 'Fraunces', serif; font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px; }
  .msg.user { align-items: flex-end; }
  .msg.user .body {
    background: var(--user-bubble); color: var(--user-ink);
    padding: 12px 18px; border-radius: 16px 16px 4px 16px; max-width: 80%;
    font-size: 17px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word;
  }
  .msg.assistant .body { max-width: 100%; font-size: 17px; line-height: 1.75; }

  /* rendered markdown inside assistant messages */
  .body p { margin: 0 0 14px; }
  .body p:last-child { margin-bottom: 0; }
  .body ul, .body ol { margin: 0 0 14px; padding-left: 26px; }
  .body li { margin-bottom: 5px; }
  .body h1, .body h2, .body h3 { font-family: 'Fraunces', serif; margin: 18px 0 10px; line-height: 1.3; }
  .body h1 { font-size: 24px; } .body h2 { font-size: 20px; } .body h3 { font-size: 17px; }
  .body strong { font-weight: 600; }
  .body a { color: var(--accent); }
  .body code:not(pre code) {
    font-family: 'JetBrains Mono', monospace; font-size: 0.86em;
    background: rgba(128,128,128,.16); padding: 2px 6px; border-radius: 5px;
  }
  .body blockquote { border-left: 3px solid var(--line); padding-left: 14px;
    color: var(--ink-soft); margin: 0 0 14px; font-style: italic; }

  /* code blocks */
  .code-wrap { position: relative; margin: 0 0 16px; border-radius: 12px; overflow: hidden;
    border: 1px solid var(--line); }
  .code-head { display: flex; align-items: center; justify-content: space-between;
    background: #21252b; color: #9aa2af; padding: 7px 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .copy-btn { background: transparent; border: 1px solid #3a3f4a; color: #c2c8d2;
    border-radius: 7px; padding: 4px 10px; cursor: pointer; font-size: 11px;
    font-family: 'JetBrains Mono', monospace; }
  .copy-btn:hover { background: #2c313a; }
  .code-wrap pre { margin: 0; }
  .code-wrap pre code {
    display: block; font-family: 'JetBrains Mono', monospace; font-size: 13.5px;
    line-height: 1.6; padding: 14px 16px; overflow-x: auto; background: var(--code-bg);
    white-space: pre;
  }

  .cursor::after { content: '▋'; color: var(--accent); animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .empty { text-align: center; color: var(--ink-soft); margin-top: 16vh;
    font-style: italic; font-size: 19px; }
  .empty .big { font-family: 'Fraunces', serif; font-style: normal; font-size: 32px;
    color: var(--ink); display: block; margin-bottom: 10px; letter-spacing: -0.02em; }

  /* scroll-to-bottom floating button */
  #scrollBtn { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--line); color: var(--ink);
    border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px;
    box-shadow: 0 2px 10px rgba(0,0,0,.15); display: none; align-items: center;
    justify-content: center; z-index: 5; }
  #scrollBtn.show { display: flex; }

  footer { border-top: 1px solid var(--line); padding: 16px 0 22px; background: var(--bg); }
  .composer { max-width: 760px; margin: 0 auto; padding: 0 28px; display: flex;
    gap: 10px; align-items: flex-end; }
  #attachments { max-width: 760px; margin: 0 auto 8px; padding: 0 28px;
    display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { background: var(--surface); border: 1px solid var(--line); border-radius: 9px;
    padding: 6px 10px; font-size: 13px; display: flex; align-items: center; gap: 7px; }
  .chip button { background: none; border: none; color: var(--ink-soft); cursor: pointer;
    font-size: 15px; padding: 0; }
  textarea { flex: 1; resize: none; border: 1px solid var(--line); background: var(--surface);
    color: var(--ink); border-radius: 14px; padding: 14px 16px;
    font-family: 'Newsreader', serif; font-size: 17px; line-height: 1.5;
    max-height: 180px; outline: none; transition: border-color .2s; }
  textarea:focus { border-color: var(--accent); }
  .send-btn { background: var(--accent); color: #fff; border: none; border-radius: 14px;
    padding: 0 22px; height: 50px; font-family: 'Fraunces', serif; font-weight: 500;
    font-size: 16px; cursor: pointer; flex-shrink: 0; }
  .send-btn:hover { opacity: .92; }
  .send-btn.stop { background: #c2453a; }

  #thread::-webkit-scrollbar, #chatList::-webkit-scrollbar,
  #memoryPanel::-webkit-scrollbar { width: 9px; }
  #thread::-webkit-scrollbar-thumb, #chatList::-webkit-scrollbar-thumb,
  #memoryPanel::-webkit-scrollbar-thumb { background: var(--line); border-radius: 5px; }
  .code-wrap pre code::-webkit-scrollbar { height: 8px; }
  .code-wrap pre code::-webkit-scrollbar-thumb { background: #4a4f5a; border-radius: 4px; }
</style>
</head>
<body>
  <!-- ===== SIDEBAR ===== -->
  <div id="sidebar">
    <div class="side-head"><h1>Hearth</h1></div>
    <button class="new-chat" id="newChat">＋ New chat</button>
    <div id="chatList"></div>
    <div class="side-foot">
      <button id="memoryBtn" class="ghost" style="width:100%">Memory</button>
    </div>
  </div>

  <!-- ===== MAIN ===== -->
  <div id="main">
    <header>
      <button class="icon-btn" id="toggleSide" title="Toggle sidebar">☰</button>
      <span class="title" id="convTitle">New chat</span>
      <span class="dot" id="status" title="connection"></span>
    </header>

    <div id="memoryPanel" class="hidden">
      <div class="wrap">
        <div class="mem-head">
          <span>What I remember about you</span>
          <button id="forgetBtn" class="ghost danger">Forget everything</button>
        </div>
        <ul id="memList"></ul>
        <div id="memEmpty" class="mem-empty">Nothing yet — I'll remember durable facts as we talk.</div>
      </div>
    </div>

    <div id="thread">
      <div class="wrap" id="messages"></div>
      <button id="scrollBtn" title="Scroll to bottom">↓</button>
    </div>

    <footer>
      <div id="attachments"></div>
      <div class="composer">
        <button class="icon-btn" id="attachBtn" title="Attach a file">＋</button>
        <input type="file" id="fileInput" multiple style="display:none">
        <textarea id="input" rows="1" placeholder="Say something…"></textarea>
        <button class="send-btn" id="send">Send</button>
      </div>
    </footer>
  </div>

<script>
  const API = "http://localhost:8000";
  marked.setOptions({ breaks: true, gfm: true });

  // ===== element refs =====
  const messagesEl = document.getElementById("messages");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const thread = document.getElementById("thread");
  const statusDot = document.getElementById("status");
  const sidebar = document.getElementById("sidebar");
  const chatListEl = document.getElementById("chatList");
  const convTitle = document.getElementById("convTitle");
  const scrollBtn = document.getElementById("scrollBtn");
  const attachmentsEl = document.getElementById("attachments");
  const fileInput = document.getElementById("fileInput");

  // ===== conversation store: many chats, each with messages =====
  // Shape: { chats: { id: {id, title, messages:[{role,content}]} }, order:[ids], current:id }
  const STORE_KEY = "hearth_store_v2";
  let store = { chats: {}, order: [], current: null };
  let attached = [];          // files staged for the next message
  let controller = null;      // AbortController for the in-flight request
  let generating = false;

  function loadStore() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) store = JSON.parse(raw);
    } catch (e) {}
    if (!store.order || !store.order.length) newChat();
    else { if (!store.current || !store.chats[store.current]) store.current = store.order[0]; renderAll(); }
  }
  function saveStore() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch (e) {}
  }
  function current() { return store.chats[store.current]; }

  function newChat() {
    const id = "c" + Date.now();
    store.chats[id] = { id, title: "New chat", messages: [] };
    store.order.unshift(id);
    store.current = id;
    saveStore(); renderAll();
  }
  function switchChat(id) { store.current = id; saveStore(); renderAll(); }
  function deleteChat(id, ev) {
    ev.stopPropagation();
    delete store.chats[id];
    store.order = store.order.filter(x => x !== id);
    if (store.current === id) store.current = store.order[0] || null;
    if (!store.current) newChat(); else { saveStore(); renderAll(); }
  }

  // ===== rendering =====
  function renderSidebar() {
    chatListEl.innerHTML = "";
    for (const id of store.order) {
      const c = store.chats[id];
      const item = document.createElement("div");
      item.className = "chat-item" + (id === store.current ? " active" : "");
      const label = document.createElement("span");
      label.textContent = c.title || "New chat";
      label.style.overflow = "hidden"; label.style.textOverflow = "ellipsis";
      const del = document.createElement("button");
      del.className = "del"; del.textContent = "×";
      del.onclick = (e) => deleteChat(id, e);
      item.appendChild(label); item.appendChild(del);
      item.onclick = () => switchChat(id);
      chatListEl.appendChild(item);
    }
  }

  function renderMessage(role, content, opts={}) {
    const msg = document.createElement("div");
    msg.className = "msg " + role;
    const who = document.createElement("div");
    who.className = "who";
    who.textContent = role === "user" ? "You" : "Hearth";
    const body = document.createElement("div");
    body.className = "body";
    if (role === "assistant") {
      if (opts.streaming) body.textContent = content;     // plain during stream
      else renderMarkdown(body, content);                 // full markdown when done
    } else {
      body.textContent = content;
    }
    msg.appendChild(who); msg.appendChild(body);
    messagesEl.appendChild(msg);
    return body;
  }

  function renderAll() {
    renderSidebar();
    messagesEl.innerHTML = "";
    const c = current();
    convTitle.textContent = c.title || "New chat";
    if (!c.messages.length) {
      messagesEl.innerHTML =
        '<div class="empty"><span class="big">Good to see you.</span>' +
        'Everything here stays on your computer. Ask me anything.</div>';
      return;
    }
    for (const m of c.messages) renderMessage(m.role, m.content);
    jumpToBottom();
  }

  // Convert markdown -> HTML, then upgrade code blocks with header + copy button.
  function renderMarkdown(el, text) {
    el.innerHTML = marked.parse(text);
    el.querySelectorAll("pre code").forEach(code => {
      const pre = code.parentElement;
      const wrap = document.createElement("div");
      wrap.className = "code-wrap";
      const head = document.createElement("div");
      head.className = "code-head";
      const lang = (code.className.match(/language-(\w+)/) || [])[1] || "code";
      const langSpan = document.createElement("span");
      langSpan.textContent = lang;
      const copy = document.createElement("button");
      copy.className = "copy-btn"; copy.textContent = "Copy";
      copy.onclick = () => {
        navigator.clipboard.writeText(code.textContent);
        copy.textContent = "Copied!";
        setTimeout(() => copy.textContent = "Copy", 1400);
      };
      head.appendChild(langSpan); head.appendChild(copy);
      pre.parentNode.insertBefore(wrap, pre);
      wrap.appendChild(head); wrap.appendChild(pre);
      try { hljs.highlightElement(code); } catch (e) {}
    });
  }

  // ===== live (streaming) markdown rendering =====
  // While tokens stream in, markdown is incomplete — a code block may be
  // half-open. We close any dangling ``` fence on a COPY of the text before
  // parsing, so code shows in a block instead of raw backticks. Throttled with
  // requestAnimationFrame so we re-parse at most once per frame, not per token.
  let renderPending = false;
  function scheduleRender(el, text) {
    if (renderPending) return;
    renderPending = true;
    requestAnimationFrame(() => {
      renderPending = false;
      let safe = text;
      const fences = (safe.match(/```/g) || []).length;
      if (fences % 2 === 1) safe += "\n```";   // close an open fence temporarily
      el.innerHTML = marked.parse(safe);
      el.querySelectorAll("pre code").forEach(code => {
        try { hljs.highlightElement(code); } catch (e) {}
      });
    });
  }

  // ===== smart scrolling =====
  function atBottom() {
    return thread.scrollHeight - thread.scrollTop - thread.clientHeight < 80;
  }
  function jumpToBottom() { thread.scrollTop = thread.scrollHeight; }
  thread.addEventListener("scroll", () => {
    scrollBtn.classList.toggle("show", !atBottom());
  });
  scrollBtn.onclick = jumpToBottom;

  // ===== status + memory =====
  fetch(API + "/health").then(r => r.json()).then(() => statusDot.classList.add("online")).catch(() => {});

  const memoryBtn = document.getElementById("memoryBtn");
  const memoryPanel = document.getElementById("memoryPanel");
  const memList = document.getElementById("memList");
  const memEmpty = document.getElementById("memEmpty");
  const forgetBtn = document.getElementById("forgetBtn");
  async function refreshMemory() {
    try {
      const r = await fetch(API + "/memory");
      const { facts } = await r.json();
      memList.innerHTML = "";
      if (facts && facts.length) {
        memEmpty.classList.add("hidden");
        facts.forEach(f => { const li = document.createElement("li"); li.textContent = f; memList.appendChild(li); });
      } else memEmpty.classList.remove("hidden");
    } catch (e) {}
  }
  memoryBtn.onclick = () => {
    memoryPanel.classList.toggle("hidden");
    if (!memoryPanel.classList.contains("hidden")) refreshMemory();
  };
  forgetBtn.onclick = async () => {
    if (!confirm("Forget everything I've learned about you?")) return;
    await fetch(API + "/memory/forget", { method: "POST" });
    refreshMemory();
  };

  // ===== sidebar controls =====
  document.getElementById("newChat").onclick = newChat;
  document.getElementById("toggleSide").onclick = () => sidebar.classList.toggle("collapsed");

  // ===== attachments (UI staging; backend reading them = RAG layer) =====
  document.getElementById("attachBtn").onclick = () => fileInput.click();
  fileInput.onchange = async () => {
    for (const file of fileInput.files) {
      const text = await file.text().catch(() => "");
      attached.push({ name: file.name, content: text.slice(0, 20000) });
    }
    fileInput.value = "";
    renderAttachments();
  };
  function renderAttachments() {
    attachmentsEl.innerHTML = "";
    attached.forEach((a, i) => {
      const chip = document.createElement("div");
      chip.className = "chip";
      chip.innerHTML = `<span>📎 ${a.name}</span>`;
      const x = document.createElement("button"); x.textContent = "×";
      x.onclick = () => { attached.splice(i, 1); renderAttachments(); };
      chip.appendChild(x);
      attachmentsEl.appendChild(chip);
    });
  }

  // ===== input =====
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 180) + "px";
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!generating) send(); }
  });
  sendBtn.onclick = () => { if (generating) stop(); else send(); };

  function setGenerating(on) {
    generating = on;
    sendBtn.textContent = on ? "Stop" : "Send";
    sendBtn.classList.toggle("stop", on);
  }
  function stop() { if (controller) controller.abort(); }

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    const c = current();

    // Build the message content, prepending any attached file text.
    let content = text;
    if (attached.length) {
      const files = attached.map(a => `[File: ${a.name}]\n${a.content}`).join("\n\n");
      content = files + "\n\n" + text;
    }

    input.value = ""; input.style.height = "auto";

    // show the user's typed text (not the giant file dump) in the UI
    renderMessage("user", text);
    c.messages.push({ role: "user", content });
    if (c.title === "New chat") { c.title = text.slice(0, 40); convTitle.textContent = c.title; }
    attached = []; renderAttachments();
    saveStore(); renderSidebar();
    if (atBottom()) jumpToBottom();

    const replyBody = renderMessage("assistant", "", { streaming: true });
    replyBody.classList.add("cursor");
    if (atBottom()) jumpToBottom();
    let reply = "";

    setGenerating(true);
    controller = new AbortController();

    try {
      const resp = await fetch(API + "/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: c.messages }),
        signal: controller.signal,
      });
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n\n");
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const payload = line.slice(6);
          if (payload === "[DONE]") continue;
          try {
            const data = JSON.parse(payload);
            if (data.status !== undefined) {
              // Agent is using a tool (or clearing the status line).
              if (data.status) {
                replyBody.innerHTML = '<span style="color:var(--ink-soft);font-style:italic">⚙ ' +
                  data.status.replace(/</g,'&lt;') + '…</span>';
              }
              if (atBottom()) jumpToBottom();
              continue;
            }
            if (data.token) {
              reply += data.token;
              scheduleRender(replyBody, reply);     // render markdown live, throttled
              if (atBottom()) jumpToBottom();       // only follow if user is at bottom
            }
          } catch (e) {}
        }
      }
    } catch (err) {
      if (err.name === "AbortError") {
        reply += (reply ? "\n\n" : "") + "_(stopped)_";
      } else {
        reply = "⚠️ Couldn't reach the model. Is the backend running and Ollama up?";
      }
    }

    replyBody.classList.remove("cursor");
    renderMarkdown(replyBody, reply);            // upgrade to full markdown + code blocks
    c.messages.push({ role: "assistant", content: reply });
    saveStore();
    setGenerating(false);
    controller = null;
    input.focus();
  }

  // ===== go =====
  loadStore();
</script>
</body>
</html>
